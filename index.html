<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>مینی‌اپ جستجوی ربات</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface2: #242424;
        --border: #2e2e2e;
        --primary: #e94560; /* Red-ish for YT */
        --primary-dim: #c73652;
        --github-color: #2ea043; /* Green for GH */
        --github-dim: #238636;
        --text: #f1f1f1;
        --text-dim: #aaaaaa;
        --text-muted: #666;
        --radius: 12px;
        --radius-sm: 8px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Vazirmatn", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* Tabs */
      .tabs {
        display: flex;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-dim);
        transition: 0.2s;
        border-bottom: 3px solid transparent;
      }
      .tab.active[data-target="yt"] {
        color: var(--primary);
        border-bottom-color: var(--primary);
        background: rgba(233, 69, 96, 0.05);
      }
      .tab.active[data-target="gh"] {
        color: var(--github-color);
        border-bottom-color: var(--github-color);
        background: rgba(46, 160, 67, 0.05);
      }

      /* Search Box */
      .search-wrap {
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 10px;
      }
      .search-input {
        flex: 1;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: "Vazirmatn", sans-serif;
        font-size: 14px;
        padding: 10px 14px;
        outline: none;
      }
      .search-input:focus {
        border-color: var(--text-dim);
      }
      .search-btn {
        background: var(--primary);
        border: none;
        border-radius: var(--radius-sm);
        color: white;
        font-family: "Vazirmatn", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 10px 18px;
        cursor: pointer;
        transition: 0.2s;
      }
      body[data-mode="gh"] .search-btn {
        background: var(--github-color);
      }
      body[data-mode="gh"] .search-btn:active {
        background: var(--github-dim);
      }

      .content {
        padding: 12px 16px;
      }

      /* Lists & Cards */
      .list-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        display: flex;
        gap: 12px;
        cursor: pointer;
        transition: 0.2s;
      }
      .card:active {
        background: var(--surface2);
      }

      /* YT specific */
      .thumb-wrap {
        width: 110px;
        height: 68px;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
        background: var(--surface2);
        position: relative;
      }
      .thumb-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* GH specific */
      .gh-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .gh-icon svg {
        width: 24px;
        height: 24px;
        fill: var(--text-dim);
      }

      .info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 2px;
      }
      .meta-tag {
        font-size: 11px;
        color: var(--text-muted);
        background: var(--surface2);
        border-radius: 4px;
        padding: 2px 6px;
      }

      /* Detail View */
      .detail-view {
        display: none;
      }
      .detail-view.active {
        display: block;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--text-dim);
        font-family: "Vazirmatn", sans-serif;
        font-size: 13px;
        cursor: pointer;
        padding: 0 0 14px 0;
      }

      .quality-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
        margin-top: 15px;
      }
      .quality-btn {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px;
        text-align: center;
        cursor: pointer;
        transition: 0.15s;
        color: var(--text);
      }
      .quality-btn.selected {
        border-color: var(--primary);
        background: rgba(233, 69, 96, 0.1);
      }

      .download-btn {
        width: 100%;
        background: var(--primary);
        border: none;
        border-radius: var(--radius);
        color: white;
        font-family: "Vazirmatn", sans-serif;
        font-size: 15px;
        font-weight: 700;
        padding: 14px;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 20px;
        transition: 0.15s;
      }
      body[data-mode="gh"] .download-btn {
        background: var(--github-color);
      }
      .download-btn:disabled {
        background: #444;
        cursor: not-allowed;
      }

      .empty-screen {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
      }

      /* Utilities */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body data-mode="yt">
    <div class="tabs">
      <div class="tab active" data-target="yt" onclick="switchTab('yt')">
        🎬 یوتیوب
      </div>
      <div class="tab" data-target="gh" onclick="switchTab('gh')">
        📦 گیت‌هاب
      </div>
    </div>

    <div class="search-wrap">
      <button class="search-btn" onclick="doSearch()">🔍 جستجو</button>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="جستجو در یوتیوب..."
        onkeydown="if (event.key === 'Enter') doSearch();"
      />
    </div>

    <div class="content">
      <div id="listView">
        <div id="emptyState" class="empty-screen">
          عبارت مورد نظر را جستجو کنید...
        </div>
        <div id="resultsList" class="list-container"></div>
      </div>

      <div id="detailView" class="detail-view">
        <button class="back-btn" onclick="goBack()">🔙 بازگشت به نتایج</button>
        <div id="detailContent"></div>
      </div>
    </div>

    <script>
      // ══════════════════════════════════════════════════
      // تنظیمات آیدی ربات (بدون توکن - کاملاً امن)
      // ══════════════════════════════════════════════════
      const BOT_USERNAME = "botimabot"; // 👈 آیدی ربات خودت رو بدون @ اینجا بنویس (مثلا: MyBestDownloaderBot)
      const YT_API_KEY = "AIzaSyBy0geMmpPTgbwe-vxe87y83k2e3qpem_s"; // کلید API یوتیوب شما
      // ══════════════════════════════════════════════════

      let currentMode = "yt";
      let currentResults = [];
      let selectedQuality = null;
      let currentItem = null;

      // سوییچ بین تب‌ها
      function switchTab(mode) {
        currentMode = mode;
        document.body.setAttribute("data-mode", mode);
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelector(`.tab[data-target="${mode}"]`)
          .classList.add("active");

        const input = document.getElementById("searchInput");
        input.placeholder =
          mode === "yt"
            ? "نام ویدیو، آهنگ یا کانال..."
            : "نام مخزن گیت‌هاب (مثال: yt-dlp)...";
        input.value = "";

        goBack();
        document.getElementById("resultsList").innerHTML = "";
        document.getElementById("emptyState").classList.remove("hidden");
      }

      // ساخت Payload رمزگذاری شده برای دیپ‌لینک
      function encodeDeepLinkPayload(str) {
        // تبدیل به Base64 و URL-Safe کردن (جایگزینی + و /)
        return btoa(unescape(encodeURIComponent(str)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      // جستجو
      async function doSearch() {
        const q = document.getElementById("searchInput").value.trim();
        if (!q) return;

        goBack();
        const list = document.getElementById("resultsList");
        const empty = document.getElementById("emptyState");
        empty.classList.add("hidden");
        list.innerHTML = `<div class="empty-screen">⏳ در حال جستجو...</div>`;

        try {
          if (currentMode === "yt") await searchYouTube(q);
          else await searchGitHub(q);
        } catch (e) {
          list.innerHTML = `<div class="empty-screen">❌ خطا: ${e.message}</div>`;
        }
      }

      // ─── منطق یوتیوب ─────────────────────────────
      async function searchYouTube(q) {
        const res = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&maxResults=10&type=video&key=${YT_API_KEY}&regionCode=IR&relevanceLanguage=fa`,
        );
        const data = await res.json();

        if (!data.items || data.items.length === 0)
          throw new Error("نتیجه‌ای پیدا نشد.");

        currentResults = data.items.map((item) => ({
          type: "yt",
          id: item.id.videoId,
          title: item.snippet.title,
          channel: item.snippet.channelTitle,
          thumbnail:
            item.snippet.thumbnails?.medium?.url ||
            item.snippet.thumbnails?.default?.url,
          url: `https://www.youtube.com/watch?v=${item.id.videoId}`,
        }));

        renderYTList();
      }

      function renderYTList() {
        const html = currentResults
          .map(
            (v, i) => `
          <div class="card" onclick="showDetail(${i})">
            <div class="thumb-wrap"><img src="${v.thumbnail}"></div>
            <div class="info">
              <div class="title">${v.title}</div>
              <div class="meta"><span class="meta-tag">📺 ${v.channel}</span></div>
            </div>
          </div>
        `,
          )
          .join("");
        document.getElementById("resultsList").innerHTML = html;
      }

      // ─── منطق گیت‌هاب ─────────────────────────────
      async function searchGitHub(q) {
        const res = await fetch(
          `https://api.github.com/search/repositories?q=${encodeURIComponent(q)}&sort=stars&per_page=10`,
        );
        const data = await res.json();

        if (!data.items || data.items.length === 0)
          throw new Error("مخزنی پیدا نشد.");

        currentResults = data.items.map((item) => ({
          type: "gh",
          fullName: item.full_name,
          desc: item.description || "بدون توضیحات",
          stars: item.stargazers_count,
          forks: item.forks_count,
          lang: item.language || "نامشخص",
          url: item.html_url,
        }));

        renderGHList();
      }

      function renderGHList() {
        const html = currentResults
          .map(
            (repo, i) => `
          <div class="card" onclick="showDetail(${i})">
            <div class="gh-icon">
              <svg viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
            </div>
            <div class="info">
              <div class="title" style="direction:ltr; text-align:left;">${repo.fullName}</div>
              <div class="meta">
                <span class="meta-tag">⭐ ${repo.stars}</span>
                <span class="meta-tag">🍴 ${repo.forks}</span>
                <span class="meta-tag">💻 ${repo.lang}</span>
              </div>
            </div>
          </div>
        `,
          )
          .join("");
        document.getElementById("resultsList").innerHTML = html;
      }

      // ─── نمایش جزئیات و ساخت لینک دانلود ──────────
      function showDetail(index) {
        currentItem = currentResults[index];
        selectedQuality = null;

        document.getElementById("listView").classList.add("hidden");
        const dv = document.getElementById("detailView");
        dv.classList.add("active");

        let html = "";

        if (currentItem.type === "yt") {
          const qualities = [
            { key: "video_1080", label: "1080p", sub: "MP4" },
            { key: "video_720", label: "720p", sub: "MP4" },
            { key: "video_480", label: "480p", sub: "MP4" },
            { key: "mp3_320", label: "MP3 Audio", sub: "صوتی" },
          ];

          html = `
            <div style="font-weight:bold; font-size:16px; margin-bottom:10px;">${currentItem.title}</div>
            <div style="color:var(--text-muted); font-size:12px; margin-bottom:20px;">📺 ${currentItem.channel}</div>
            
            <div style="font-size:13px; margin-bottom:10px;">انتخاب کیفیت:</div>
            <div class="quality-grid">
              ${qualities
                .map(
                  (q) => `
                <div class="quality-btn" id="qbtn_${q.key}" onclick="selectYTQuality('${q.key}')">
                  <div>${q.label}</div>
                  <div style="font-size:11px; color:var(--text-muted);">${q.sub}</div>
                </div>
              `,
                )
                .join("")}
            </div>
            <a href="#" id="dlBtn" class="download-btn" onclick="return false;" disabled>📥 دانلود در بله</a>
          `;
        } else {
          // GitHub
          const payload = encodeDeepLinkPayload(`gh|${currentItem.url}`);
          const botLink = `https://ble.ir/${BOT_USERNAME}?start=dl_${payload}`;

          html = `
            <div style="font-weight:bold; font-size:16px; margin-bottom:10px; direction:ltr; text-align:left;">${currentItem.fullName}</div>
            <div style="font-size:13px; color:var(--text-dim); margin-bottom:15px; line-height:1.6;">${currentItem.desc}</div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
              <span style="background:var(--surface2); padding:4px 8px; border-radius:6px; font-size:12px;">⭐ ${currentItem.stars}</span>
              <span style="background:var(--surface2); padding:4px 8px; border-radius:6px; font-size:12px;">💻 ${currentItem.lang}</span>
            </div>
            
            <a href="${botLink}" target="_blank" class="download-btn">📦 ارسال فایل به بله</a>
          `;
        }

        document.getElementById("detailContent").innerHTML = html;
      }

      function selectYTQuality(key) {
        selectedQuality = key;
        document
          .querySelectorAll(".quality-btn")
          .forEach((b) => b.classList.remove("selected"));
        document.getElementById("qbtn_" + key).classList.add("selected");

        // ساخت دیپ‌لینک برای یوتیوب
        const payloadStr = `yt|${currentItem.url}|${selectedQuality}`;
        const b64Payload = encodeDeepLinkPayload(payloadStr);
        const botLink = `https://ble.ir/${BOT_USERNAME}?start=dl_${b64Payload}`;

        const btn = document.getElementById("dlBtn");
        btn.href = botLink;
        btn.target = "_blank"; // باز شدن در تب/اپ جدید
        btn.removeAttribute("onclick");
        btn.removeAttribute("disabled");
      }

      function goBack() {
        document.getElementById("listView").classList.remove("hidden");
        document.getElementById("detailView").classList.remove("active");
      }
    </script>
  </body>
</html>
