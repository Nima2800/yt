<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>جستجوی یوتیوب</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface2: #242424;
        --border: #2e2e2e;
        --red: #ff0000;
        --red-dim: #cc0000;
        --red-glow: rgba(255, 0, 0, 0.15);
        --text: #f1f1f1;
        --text-dim: #aaaaaa;
        --text-muted: #666;
        --radius: 12px;
        --radius-sm: 8px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Vazirmatn", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ─── Header ─── */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 32px;
        height: 32px;
        background: var(--red);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 0 12px var(--red-glow);
      }
      .logo svg {
        width: 18px;
        height: 18px;
        fill: white;
      }
      .header-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }
      .header-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      /* ─── Search Box ─── */
      .search-wrap {
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 10px;
      }
      .search-input {
        flex: 1;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: "Vazirmatn", sans-serif;
        font-size: 14px;
        padding: 10px 14px;
        outline: none;
        transition: border-color 0.2s;
        text-align: right;
        direction: rtl;
      }
      .search-input:focus {
        border-color: var(--red);
      }
      .search-input::placeholder {
        color: var(--text-muted);
      }
      .search-btn {
        background: var(--red);
        border: none;
        border-radius: var(--radius-sm);
        color: white;
        font-family: "Vazirmatn", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 10px 18px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .search-btn:active {
        background: var(--red-dim);
        transform: scale(0.97);
      }

      /* ─── Content area ─── */
      .content {
        padding: 12px 16px;
      }

      /* ─── Skeleton ─── */
      .skeleton-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .skeleton-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 12px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .skel {
        background: linear-gradient(
          90deg,
          var(--surface2) 25%,
          var(--border) 50%,
          var(--surface2) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 6px;
      }
      @keyframes shimmer {
        to {
          background-position: -200% 0;
        }
      }
      .skel-thumb {
        width: 100px;
        height: 62px;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .skel-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .skel-line {
        height: 12px;
      }

      /* ─── Video Cards (list) ─── */
      .video-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .video-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        display: flex;
        gap: 12px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        -webkit-user-select: none;
        user-select: none;
        animation: fadeUp 0.3s ease both;
      }
      .video-card:active {
        background: var(--surface2);
        border-color: var(--red);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .thumb-wrap {
        position: relative;
        width: 110px;
        height: 68px;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
        background: var(--surface2);
      }
      .thumb-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .duration-badge {
        position: absolute;
        bottom: 4px;
        left: 4px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 5px;
        border-radius: 4px;
        letter-spacing: 0.3px;
      }
      .play-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .video-card:active .play-overlay {
        opacity: 1;
      }
      .play-overlay svg {
        width: 28px;
        height: 28px;
        fill: white;
        filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.8));
      }

      .video-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .video-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.4;
        color: var(--text);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .video-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 2px;
      }
      .meta-tag {
        font-size: 10px;
        color: var(--text-muted);
        background: var(--surface2);
        border-radius: 4px;
        padding: 2px 6px;
      }
      .meta-tag.views {
        color: var(--red);
      }

      /* ─── Detail View ─── */
      .detail-view {
        display: none;
        animation: fadeUp 0.25s ease;
      }
      .detail-view.active {
        display: block;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--text-dim);
        font-family: "Vazirmatn", sans-serif;
        font-size: 13px;
        cursor: pointer;
        padding: 0 0 14px 0;
      }
      .back-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .detail-thumb {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface2);
        margin-bottom: 14px;
        position: relative;
      }
      .detail-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .yt-link-btn {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 11px;
        color: white;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .detail-title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.5;
        margin-bottom: 10px;
      }
      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .detail-badge {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid var(--border);
        color: var(--text-dim);
      }
      .detail-badge.red {
        border-color: var(--red);
        color: var(--red);
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
      }
      .quality-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
      }
      .quality-btn {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        font-family: "Vazirmatn", sans-serif;
        color: var(--text);
      }
      .quality-btn:active {
        border-color: var(--red);
        background: var(--red-glow);
      }
      .quality-btn.selected {
        border-color: var(--red);
        background: var(--red-glow);
      }
      .q-label {
        font-size: 13px;
        font-weight: 600;
      }
      .q-sub {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .q-sub.audio {
        color: #1db954;
      }

      .download-btn {
        width: 100%;
        background: var(--red);
        border: none;
        border-radius: var(--radius);
        color: white;
        font-family: "Vazirmatn", sans-serif;
        font-size: 15px;
        font-weight: 700;
        padding: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition:
          background 0.15s,
          transform 0.1s;
        box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
        margin-bottom: 30px;
      }
      .download-btn:active {
        background: var(--red-dim);
        transform: scale(0.98);
      }
      .download-btn svg {
        width: 20px;
        height: 20px;
        fill: white;
      }
      .download-btn:disabled {
        background: #444;
        box-shadow: none;
        cursor: not-allowed;
      }

      /* ─── State screens ─── */
      .empty-screen {
        text-align: center;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .empty-icon {
        width: 72px;
        height: 72px;
        background: var(--surface2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .empty-icon svg {
        width: 36px;
        height: 36px;
        fill: var(--text-muted);
      }
      .empty-title {
        font-size: 17px;
        font-weight: 700;
      }
      .empty-sub {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
        max-width: 260px;
      }

      /* ─── Toast ─── */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #1db954;
        color: white;
        font-family: "Vazirmatn", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 12px 20px;
        border-radius: 30px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        transition: transform 0.3s ease;
        z-index: 999;
        white-space: nowrap;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
      .toast.error {
        background: var(--red);
      }

      /* ─── Loading spinner ─── */
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid var(--surface2);
        border-top-color: var(--red);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-center {
        text-align: center;
        padding: 60px 20px;
      }
      .loading-center p {
        margin-top: 14px;
        color: var(--text-muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24">
          <path
            d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.19 8.19 0 0 0 4.77 1.52V6.76a4.85 4.85 0 0 1-1-.07z"
          />
        </svg>
      </div>
      <div>
        <div class="header-title">جستجوی یوتیوب</div>
        <div class="header-sub">دانلود مستقیم در بله</div>
      </div>
    </div>

    <div class="search-wrap">
      <button class="search-btn" onclick="doSearch()">🔍 جستجو</button>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="نام ویدیو، آهنگ یا کانال..."
        onkeydown="if (event.key === 'Enter') doSearch();"
      />
    </div>

    <div class="content" id="mainContent">
      <!-- List view -->
      <div id="listView">
        <div class="empty-screen">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24">
              <path
                d="M21.8 8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.8 5 12 5 12 5s-4.8 0-7 .1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S2 9.6 2 11.2v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.2.8C6.8 19 12 19 12 19s4.8 0 7-.1c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.5C22 9.6 21.8 8 21.8 8zM9.8 14.5V9l5.4 2.8-5.4 2.7z"
              />
            </svg>
          </div>
          <div class="empty-title">دنبال چی می‌گردی؟</div>
          <div class="empty-sub">
            اسم ویدیو، آهنگ یا کانال یوتیوب رو بالا تایپ کن
          </div>
        </div>
      </div>

      <!-- Detail view -->
      <div id="detailView" class="detail-view">
        <button class="back-btn" onclick="goBack()">
          <svg viewBox="0 0 24 24">
            <path
              d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
            />
          </svg>
          بازگشت به نتایج
        </button>
        <div id="detailContent"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // ══════════════════════════════════════════════════
      //  تنظیمات — ربات خودت رو اینجا وارد کن
      // ══════════════════════════════════════════════════
      const BOT_TOKEN = "1472351000:SXpVhZBmsFrD9EBl7Cy9h3YQkU-tRglpLNA"; // توکن ربات بله
      const BALE_API = `https://tapi.bale.ai/bot${BOT_TOKEN}`;
      const YT_API_KEY = "AIzaSyBy0geMmpPTgbwe-vxe87y83k2e3qpem_s"; // YouTube Data API v3

      // ══════════════════════════════════════════════════

      let currentResults = [];
      let selectedQuality = null;
      let currentVideo = null;
      let chatId = null;

      // گرفتن chat_id از پارامتر URL
      const urlParams = new URLSearchParams(window.location.search);
      chatId = urlParams.get("chat_id") || urlParams.get("user_id");

      // ─── جستجو در یوتیوب ───────────────────────────
      async function doSearch() {
        const q = document.getElementById("searchInput").value.trim();
        if (!q) return;

        const listView = document.getElementById("listView");
        listView.innerHTML = buildSkeletons(5);
        document.getElementById("detailView").classList.remove("active");

        try {
          const res = await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&maxResults=10&type=video&key=${YT_API_KEY}&regionCode=IR&relevanceLanguage=fa`,
          );
          const data = await res.json();

          if (!data.items || data.items.length === 0) {
            listView.innerHTML = `<div class="empty-screen">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
        <div class="empty-title">نتیجه‌ای پیدا نشد</div>
        <div class="empty-sub">عبارت دیگری امتحان کن</div>
      </div>`;
            return;
          }

          // گرفتن آمار ویدیوها (مدت زمان + بازدید)
          const videoIds = data.items.map((i) => i.id.videoId).join(",");
          const statsRes = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${videoIds}&key=${YT_API_KEY}`,
          );
          const statsData = await statsRes.json();
          const statsMap = {};
          (statsData.items || []).forEach((v) => {
            statsMap[v.id] = v;
          });

          currentResults = data.items.map((item) => {
            const vid = item.id.videoId;
            const sn = item.snippet;
            const st = statsMap[vid] || {};
            const dur = parseDuration(st.contentDetails?.duration || "");
            const views = formatViews(st.statistics?.viewCount);
            return {
              id: vid,
              title: sn.title,
              channel: sn.channelTitle,
              thumbnail:
                sn.thumbnails?.medium?.url || sn.thumbnails?.default?.url,
              duration: dur,
              views: views,
              published: sn.publishedAt?.slice(0, 10),
              url: `https://www.youtube.com/watch?v=${vid}`,
            };
          });

          renderList(currentResults);
        } catch (e) {
          listView.innerHTML = `<div class="empty-screen">
      <div class="empty-title">خطا در جستجو</div>
      <div class="empty-sub">${e.message}</div>
    </div>`;
        }
      }

      // ─── رندر لیست ─────────────────────────────────
      function renderList(videos) {
        const listView = document.getElementById("listView");
        listView.innerHTML = `<div class="video-list">${videos
          .map(
            (v, i) => `
    <div class="video-card" onclick="showDetail(${i})" style="animation-delay:${i * 40}ms">
      <div class="thumb-wrap">
        <img src="${v.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">
        ${v.duration ? `<span class="duration-badge">${v.duration}</span>` : ""}
        <div class="play-overlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="video-info">
        <div class="video-title">${escHtml(v.title)}</div>
        <div class="video-meta">
          <span class="meta-tag">📺 ${escHtml(v.channel)}</span>
          ${v.duration ? `<span class="meta-tag">⏱ ${v.duration}</span>` : ""}
          ${v.views ? `<span class="meta-tag views">👁 ${v.views}</span>` : ""}
          ${v.published ? `<span class="meta-tag">📅 ${v.published}</span>` : ""}
        </div>
      </div>
    </div>
  `,
          )
          .join("")}</div>`;
      }

      // ─── نمایش جزئیات ──────────────────────────────
      function showDetail(index) {
        currentVideo = currentResults[index];
        selectedQuality = null;

        document.getElementById("listView").style.display = "none";
        const dv = document.getElementById("detailView");
        dv.classList.add("active");

        const qualities = [
          {
            key: "video_1080",
            label: "1080p",
            sub: "Full HD · MP4",
            type: "video",
          },
          { key: "video_720", label: "720p", sub: "HD · MP4", type: "video" },
          { key: "video_480", label: "480p", sub: "SD · MP4", type: "video" },
          {
            key: "video_360",
            label: "360p",
            sub: "کم حجم · MP4",
            type: "video",
          },
          {
            key: "mp3_320",
            label: "MP3",
            sub: "320kbps · صوتی",
            type: "audio",
          },
          {
            key: "mp3_128",
            label: "MP3",
            sub: "128kbps · صوتی",
            type: "audio",
          },
        ];

        document.getElementById("detailContent").innerHTML = `
    <div class="detail-thumb">
      <img src="${currentVideo.thumbnail}" alt="">
      <a class="yt-link-btn" href="${currentVideo.url}" target="_blank">▶ یوتیوب</a>
    </div>
    <div class="detail-title">${escHtml(currentVideo.title)}</div>
    <div class="detail-meta">
      <span class="detail-badge red">📺 ${escHtml(currentVideo.channel)}</span>
      ${currentVideo.duration ? `<span class="detail-badge">⏱ ${currentVideo.duration}</span>` : ""}
      ${currentVideo.views ? `<span class="detail-badge">👁 ${currentVideo.views}</span>` : ""}
      ${currentVideo.published ? `<span class="detail-badge">📅 ${currentVideo.published}</span>` : ""}
    </div>
    <div class="section-title">کیفیت دانلود را انتخاب کن</div>
    <div class="quality-grid">
      ${qualities
        .map(
          (q) => `
        <div class="quality-btn" id="qbtn_${q.key}" onclick="selectQuality('${q.key}')">
          <div class="q-label">${q.label}</div>
          <div class="q-sub ${q.type === "audio" ? "audio" : ""}">${q.sub}</div>
        </div>
      `,
        )
        .join("")}
    </div>
    <button class="download-btn" id="dlBtn" onclick="requestDownload()" disabled>
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      ابتدا کیفیت را انتخاب کنید
    </button>
  `;
      }

      function selectQuality(key) {
        selectedQuality = key;
        document
          .querySelectorAll(".quality-btn")
          .forEach((b) => b.classList.remove("selected"));
        document.getElementById("qbtn_" + key)?.classList.add("selected");
        const btn = document.getElementById("dlBtn");
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> دانلود در بله`;
      }

      // ─── ارسال درخواست دانلود به ربات ──────────────
      async function requestDownload() {
        if (!selectedQuality || !currentVideo) return;
        if (!chatId) {
          showToast("chat_id پیدا نشد! از طریق ربات وارد شو", true);
          return;
        }

        const btn = document.getElementById("dlBtn");
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner" style="width:22px;height:22px;border-width:2px;margin:0;"></div> در حال ارسال درخواست...`;

        const text = `/miniapp_dl ${currentVideo.url} ${selectedQuality}`;

        try {
          const res = await fetch(`${BALE_API}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: parseInt(chatId), text }),
          });
          const data = await res.json();
          if (data.ok) {
            showToast("✅ درخواست ارسال شد! ربات شروع به دانلود می‌کند");
            btn.innerHTML = `✅ درخواست ارسال شد`;
          } else {
            throw new Error(data.description || "خطا در ارسال");
          }
        } catch (e) {
          showToast("❌ خطا: " + e.message, true);
          btn.disabled = false;
          btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> دانلود در بله`;
        }
      }

      // ─── بازگشت ────────────────────────────────────
      function goBack() {
        document.getElementById("listView").style.display = "";
        document.getElementById("detailView").classList.remove("active");
      }

      // ─── Helpers ───────────────────────────────────
      function buildSkeletons(n) {
        return `<div class="skeleton-list">${Array(n)
          .fill(
            `
    <div class="skeleton-card">
      <div class="skel skel-thumb"></div>
      <div class="skel-body">
        <div class="skel skel-line" style="width:90%"></div>
        <div class="skel skel-line" style="width:60%"></div>
        <div class="skel skel-line" style="width:40%"></div>
      </div>
    </div>`,
          )
          .join("")}</div>`;
      }

      function parseDuration(iso) {
        if (!iso) return "";
        const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        if (!m) return "";
        const h = parseInt(m[1] || 0),
          min = parseInt(m[2] || 0),
          s = parseInt(m[3] || 0);
        if (h)
          return `${h}:${String(min).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        return `${min}:${String(s).padStart(2, "0")}`;
      }

      function formatViews(n) {
        if (!n) return "";
        n = parseInt(n);
        if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
        if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
        if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
        return String(n);
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function showToast(msg, isErr = false) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast" + (isErr ? " error" : "") + " show";
        setTimeout(() => {
          t.className = "toast" + (isErr ? " error" : "");
        }, 3500);
      }
    </script>
  </body>
</html>
